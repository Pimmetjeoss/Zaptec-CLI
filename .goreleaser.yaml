version: 2
project_name: zaptec-pp-cli
changelog:
  disable: true
builds:
  - id: zaptec-pp-cli
    main: ./cmd/zaptec-pp-cli
    binary: zaptec-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/Pimmetjeoss/Zaptec-CLI/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: zaptec-pp-mcp
    main: ./cmd/zaptec-pp-mcp
    binary: zaptec-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: zaptec-pp-cli
    repository:
      owner: pimmetjeoss
      name: homebrew-tap
    homepage: "https://github.com/Pimmetjeoss/Zaptec-CLI"
    description: "The only command-line tool for Zaptec Go chargers — pause and resume charging, read live state in plain English,..."
    install: |
      bin.install "zaptec-pp-cli"
      bin.install "zaptec-pp-mcp"
